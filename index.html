<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moje finance</title>
<style>
body{background:#111;color:white;font-family:Arial;padding:15px}
h1{color:#7dd3fc}
input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;font-size:16px}
button{background:#22c55e;color:white;font-weight:bold}
.card{background:#1f2937;padding:12px;border-radius:14px;margin:10px 0}
.item{background:#0f172a;padding:10px;border-radius:10px;margin:8px 0}
.plus{color:#4ade80}.minus{color:#f87171}.debt{color:#facc15}
.small{color:#aaa;font-size:13px}
</style>
</head>
<body>

<h1>Moje finance 💰</h1>

<div class="card">
<h3>Kurz EUR / CZK</h3>
<input id="kurz" type="number" step="0.001" value="25">
<button onclick="nactiKurz()">Načíst aktuální kurz</button>
<p class="small" id="kurzInfo">Kurz můžeš změnit i ručně.</p>
</div>

<div class="card">
<h3>Vyber měsíc</h3>
<input id="mesic" type="month" onchange="zmenMesic()">
</div>

<div class="card">
<h3>Přidat položku</h3>

<input id="datum" type="date">
<input id="nazev" placeholder="Název">

<select id="typ">
<option value="prijem">Příjem</option>
<option value="vydaj">Výdaj</option>
<option value="dluzim">Nový dluh</option>
<option value="splatkaMoje">Splátka dluhu</option>
<option value="dluzimi">Někdo mi dluží</option>
<option value="vracenoMne">Vrátil mi</option>
</select>

<input id="osoba" placeholder="Osoba">

<div style="display:flex;gap:8px">
<input id="castka" type="number" placeholder="Částka" style="width:65%">
<select id="mena" style="width:35%">
<option value="CZK">Kč</option>
<option value="EUR">€</option>
</select>
</div>

<button onclick="pridat()">Přidat</button>
</div>

<div class="card">
<h2>Přehled</h2>
<p>Příjmy: <b id="sPrijem"></b></p>
<p>Výdaje: <b id="sVydaj"></b></p>
<p>Dluhy: <b id="sDluzim"></b></p>
<p>Pohledávky: <b id="sDluzimi"></b></p>
<h2>Zůstatek: <span id="zustatek"></span></h2>
</div>

<div class="card">
<div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("finance")) || [];

function kurz(){ return Number(document.getElementById("kurz").value) || 25; }
function eurNaCzk(e){ return e * kurz(); }
function czkNaEur(c){ return c / kurz(); }

function format(czk){
 return czk.toFixed(0)+" Kč / "+czkNaEur(czk).toFixed(2)+" €";
}

function nactiKurz(){
 fetch("https://api.frankfurter.app/latest?from=EUR&to=CZK")
 .then(r=>r.json())
 .then(d=>{
  let k = d.rates.CZK;
  document.getElementById("kurz").value = k;
  document.getElementById("kurzInfo").innerText = "1 € = "+k+" Kč";
  render();
 })
 .catch(()=>alert("Nepodařilo se načíst kurz"));
}

function zmenMesic(){
 let m = document.getElementById("mesic").value;
 document.getElementById("datum").value = m+"-01";
 render();
}

function pridat(){
 let mena = document.getElementById("mena").value;
 let castka = Number(document.getElementById("castka").value);
 let czk = mena==="EUR"? eurNaCzk(castka):castka;

 data.push({
  id:Date.now(),
  datum:document.getElementById("datum").value,
  mesic:document.getElementById("datum").value.slice(0,7),
  nazev:document.getElementById("nazev").value,
  typ:document.getElementById("typ").value,
  osoba:document.getElementById("osoba").value,
  czk:czk
 });

 localStorage.setItem("finance",JSON.stringify(data));
 render();
}

function render(){
 let m = document.getElementById("mesic").value;
 let f = data.filter(x=>x.mesic===m);

 let prijem=0,vydaj=0,dluh=0,dluhMne=0,platby=0,vraceno=0;
 let html="";

 f.forEach(x=>{
  if(x.typ==="prijem") prijem+=x.czk;
  if(x.typ==="vydaj") vydaj+=x.czk;
  if(x.typ==="dluzim") dluh+=x.czk;
  if(x.typ==="splatkaMoje"){ vydaj+=x.czk; platby+=x.czk;}
  if(x.typ==="dluzimi") dluhMne+=x.czk;
  if(x.typ==="vracenoMne"){ prijem+=x.czk; vraceno+=x.czk;}

  html+=`<div class="item">${x.nazev} - ${format(x.czk)}</div>`;
 });

 document.getElementById("sPrijem").innerText=format(prijem);
 document.getElementById("sVydaj").innerText=format(vydaj);
 document.getElementById("sDluzim").innerText=format(Math.max(0,dluh-platby));
 document.getElementById("sDluzimi").innerText=format(Math.max(0,dluhMne-vraceno));
 document.getElementById("zustatek").innerText=format(prijem-vydaj);
 document.getElementById("list").innerHTML=html;
}

render();
</script>

</body>
</html>
