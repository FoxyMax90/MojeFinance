<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moje finance</title>
<style>
body{background:#111;color:white;font-family:Arial;padding:15px}
h1{color:#7dd3fc}
input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;font-size:16px}
button{background:#22c55e;color:white;font-weight:bold}
.card{background:#1f2937;padding:12px;border-radius:14px;margin:10px 0}
.item{background:#0f172a;padding:10px;border-radius:10px;margin:8px 0}
.plus{color:#4ade80}.minus{color:#f87171}.debt{color:#facc15}
.small{color:#aaa;font-size:13px}
</style>
</head>
<body>

<h1>Moje finance 💰</h1>

<div class="card">
<h3>Kurz EUR / CZK</h3>
<input id="kurz" type="number" step="0.001" placeholder="Např. 25.20" onchange="uloz();render()">
<button onclick="nactiKurz()">Načíst aktuální kurz</button>
<p class="small" id="kurzInfo">Kurz můžeš změnit i ručně.</p>
</div>

<div class="card">
<h3>Vyber měsíc</h3>
<input id="mesic" type="month" onchange="zmenMesic()">
</div>

<div class="card">
<h3>Přidat položku</h3>

<input id="datum" type="date">
<input id="nazev" placeholder="Název: výplata, nákup, splátka...">

<select id="typ">
<option value="prijem">Příjem</option>
<option value="vydaj">Výdaj</option>
<option value="dluzim">Nový dluh - komu dlužím</option>
<option value="splatkaMoje">Splátka mého dluhu</option>
<option value="dluzimi">Někdo mi dluží</option>
<option value="vracenoMne">Někdo mi vrátil</option>
</select>

<input id="osoba" placeholder="Osoba / firma">

<div style="display:flex;gap:8px">
<input id="castka" type="number" placeholder="Částka" style="width:65%">
<select id="mena" style="width:35%">
<option value="CZK">Kč</option>
<option value="EUR">€</option>
</select>
</div>

<button onclick="pridat()">Přidat položku</button>
</div>

<div class="card">
<h2>Přehled měsíce</h2>
<p class="plus">Příjmy: <b id="sPrijem">0 Kč / 0 €</b></p>
<p class="minus">Výdaje: <b id="sVydaj">0 Kč / 0 €</b></p>
<p class="debt">Komu ještě dlužím: <b id="sDluzim">0 Kč / 0 €</b></p>
<p class="plus">Kdo mi ještě dluží: <b id="sDluzimi">0 Kč / 0 €</b></p>
<h2>Zůstatek: <span id="zustatek">0 Kč / 0 €</span></h2>
</div>

<div class="card">
<h3>Seznam položek</h3>
<div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("mojeFinance")) || [];
let ulozenyKurz = localStorage.getItem("kurzEurCzk") || 25;
document.getElementById("kurz").value = ulozenyKurz;

let dnes = new Date();
let dnesText = dnes.toISOString().slice(0,10);
let mesicText = dnes.toISOString().slice(0,7);

document.getElementById("datum").value = dnesText;
document.getElementById("mesic").value = mesicText;

function zmenMesic(){
 let mesic = document.getElementById("mesic").value;
 if(mesic){
  let den = String(dnes.getDate()).padStart(2,"0");
  let noveDatum = mesic + "-" + den;

  let test = new Date(noveDatum);
  if(test.getMonth() + 1 !== Number(mesic.slice(5,7))){
   noveDatum = mesic + "-01";
  }

  document.getElementById("datum").value = noveDatum;
 }
 render();
}

function kurz(){ return Number(document.getElementById("kurz").value) || 25; }
function czkNaEur(czk){ return czk / kurz(); }
function eurNaCzk(eur){ return eur * kurz(); }

function kc(n){ return Number(n).toLocaleString("cs-CZ",{maximumFractionDigits:0}) + " Kč"; }
function eur(n){ return Number(n).toLocaleString("cs-CZ",{maximumFractionDigits:2}) + " €"; }
function oboje(czk){ return kc(czk) + " / " + eur(czkNaEur(czk)); }

function uloz(){
 localStorage.setItem("mojeFinance", JSON.stringify(data));
 localStorage.setItem("kurzEurCzk", kurz());
}

async function nactiKurz(){
 try{
  let r = await fetch("https://api.frankfurter.dev/v2/latest?base=EUR&symbols=CZK");
  let j = await r.json();
  if(j.rates && j.rates.CZK){
   document.getElementById("kurz").value = j.rates.CZK;
   document.getElementById("kurzInfo").innerText = "Načten kurz: 1 € = " + j.rates.CZK + " Kč";
   uloz();
   render();
  }
 }catch(e){
  document.getElementById("kurzInfo").innerText = "Kurz se nepodařilo načíst. Zadej ho ručně.";
 }
}

function pridat(){
 let castka = Number(document.getElementById("castka").value);
 let mena = document.getElementById("mena").value;
 let castkaCZK = mena === "EUR" ? eurNaCzk(castka) : castka;

 let polozka = {
  id: Date.now(),
  datum: document.getElementById("datum").value,
  mesic: document.getElementById("datum").value.slice(0,7),
  nazev: document.getElementById("nazev").value,
  typ: document.getElementById("typ").value,
  osoba: document.getElementById("osoba").value,
  castka: castka,
  mena: mena,
  castkaCZK: castkaCZK
 };

 if(!polozka.nazev || !polozka.castka){
  alert("Napiš název a částku.");
  return;
 }

 data.push(polozka);
 uloz();

 document.getElementById("nazev").value="";
 document.getElementById("osoba").value="";
 document.getElementById("castka").value="";

 render();
}

function smazat(id){
 if(confirm("Smazat položku?")){
  data = data.filter(x => x.id !== id);
  uloz();
  render();
 }
}

function render(){
 localStorage.setItem("kurzEurCzk", kurz());

 let mesic = document.getElementById("mesic").value;
 let filt = data.filter(x => x.mesic === mesic);

 let prijem=0, vydaj=0;
 let novyDluh=0, splacenoMoje=0;
 let dluhMne=0, vracenoMne=0;
 let html="";

 filt.forEach(x=>{
  let c = x.castkaCZK || (x.mena==="EUR" ? eurNaCzk(x.castka) : x.castka);

  if(x.typ==="prijem") prijem += c;
  if(x.typ==="vydaj") vydaj += c;

  if(x.typ==="dluzim") novyDluh += c;
  if(x.typ==="splatkaMoje"){
    splacenoMoje += c;
    vydaj += c;
  }

  if(x.typ==="dluzimi") dluhMne += c;
  if(x.typ==="vracenoMne"){
    vracenoMne += c;
    prijem += c;
  }

  let label = {
   prijem:"Příjem",
   vydaj:"Výdaj",
   dluzim:"Nový dluh - komu dlužím",
   splatkaMoje:"Splátka mého dluhu",
   dluzimi:"Někdo mi dluží",
   vracenoMne:"Někdo mi vrátil"
  }[x.typ];

  html += `
  <div class="item">
    <b>${x.nazev}</b><br>
    <span class="small">${x.datum} • ${label}</span><br>
    ${x.osoba ? "<span>Osoba/firma: "+x.osoba+"</span><br>" : ""}
    <b>${x.castka} ${x.mena==="EUR" ? "€" : "Kč"}</b><br>
    <span class="small">Přepočet: ${oboje(c)}</span><br>
    <button onclick="smazat(${x.id})" style="background:#ef4444;margin-top:8px">Smazat</button>
  </div>`;
 });

 let zbyvaDluzim = Math.max(0, novyDluh - splacenoMoje);
 let zbyvaDluzimi = Math.max(0, dluhMne - vracenoMne);

 document.getElementById("sPrijem").innerText = oboje(prijem);
 document.getElementById("sVydaj").innerText = oboje(vydaj);
 document.getElementById("sDluzim").innerText = oboje(zbyvaDluzim);
 document.getElementById("sDluzimi").innerText = oboje(zbyvaDluzimi);
 document.getElementById("zustatek").innerText = oboje(prijem - vydaj);
 document.getElementById("list").innerHTML = html || "Zatím tu nic není.";
}

nactiKurz();
render();
</script>

</body>
</html>
